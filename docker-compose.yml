version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: customer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: mock_server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLASK_ENV: production
    networks:
      - app-network
    restart: unless-stopped

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: Dockerfile
    container_name: pipeline_service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
